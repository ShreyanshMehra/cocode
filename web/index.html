<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cocode — collaborative editor</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="brand">cocode</div>
    <div class="meta">
      <span id="room" class="pill">room: default</span>
      <span id="participants" class="participants"></span>
      <span id="status" class="pill status-connecting">connecting…</span>
    </div>
  </header>

  <main>
    <p class="hint">
      Open this page in two tabs (or share the URL) and type — edits sync live and
      converge conflict-free via a hand-built CRDT. Change the room with a URL hash,
      e.g. <code>#myroom</code>.
    </p>
    <div class="workspace">
      <textarea id="editor" spellcheck="false"
        placeholder="Start typing to collaborate…"></textarea>
      <aside class="sidebar">
        <div class="panel">
          <div class="panel-head">
            <span>Versions</span>
            <button id="save-btn" class="btn">Save version</button>
          </div>
          <ul id="versions" class="versions"></ul>
        </div>
        <div class="panel">
          <div class="panel-head"><span>Diff</span></div>
          <pre id="diff" class="diff"><span class="muted">Select two versions to compare.</span></pre>
        </div>
      </aside>
    </div>
  </main>

  <script src="/crdt.js"></script>
  <script src="/app.js"></script>
</body>
</html>
